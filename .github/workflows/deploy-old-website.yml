name: Deploy Old Website

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-old-website.yml"
      - "old-vps-website-2026-03-11/**"
  workflow_dispatch:

concurrency:
  group: deploy-old-website-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.OLD_VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync website files
        env:
          SSHPASS: ${{ secrets.OLD_VPS_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            "old-vps-website-2026-03-11/" \
            "${{ secrets.OLD_VPS_USER }}@${{ secrets.OLD_VPS_HOST }}:/var/www/octopilot-website/"

      - name: Rebuild Tailwind on VPS
        env:
          SSHPASS: ${{ secrets.OLD_VPS_PASSWORD }}
        run: |
          sshpass -e ssh "${{ secrets.OLD_VPS_USER }}@${{ secrets.OLD_VPS_HOST }}" "
            cd /var/www/octopilot-website &&
            npm ci &&
            npm run build:css
          "
