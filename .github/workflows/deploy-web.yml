name: Deploy Web App

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-web-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          for attempt in 1 2 3; do
            if ssh-keyscan -T 15 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Failed to fetch SSH host key for ${{ secrets.DEPLOY_HOST }}" >&2
          exit 1

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd /opt/octopilot-web && bash scripts/deploy-web.sh"
